<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Play Chess vs Bot</title>
    <!-- Load the Chessboard styling -->
    <link rel="stylesheet" href="https://cloudflare.com">
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #262522;
            color: white;
            margin-top: 20px;
        }
        #myBoard {
            width: 400px;
            max-width: 90vw;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }
        .status-box {
            margin: 15px;
            font-size: 1.2rem;
            font-weight: bold;
        }
        button {
            padding: 10px 20px;
            font-size: 1rem;
            background-color: #81b64c;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover { background-color: #a3d16c; }
    </style>
</head>
<body>

    <h1>Chess vs AI Bot 🤖</h1>
    <div id="myBoard"></div>
    <div class="status-box" id="status">Your turn (White)</div>
    <button onclick="resetGame()">Restart Game</button>

    <!-- Load dependencies: jQuery, Chess.js (rules), and Chessboard.js (UI) -->
    <script src="https://jquery.com"></script>
    <script src="https://cloudflare.com"></script>
    <script src="https://cloudflare.com"></script>

    <script>
        let board = null;
        let game = new Chess();
        const statusEl = $('#status');

        function onDragStart(source, piece, position, orientation) {
            // Do not pick up pieces if the game is over or it's Black's (Bot's) turn
            if (game.game_over() || piece.search(/^b/) !== -1) return false;
        }

        function makeRandomMove() {
            let possibleMoves = game.moves();

            // Game over conditions
            if (possibleMoves.length === 0) {
                if (game.in_checkmate()) statusEl.html('Game Over! You win by checkmate! 🎉');
                else statusEl.html('Game Over! Draw/Stalemate! 🤝');
                return;
            }

            // --- THIS IS YOUR BOT LOGIC ---
            // Right now, your bot picks a completely random legal move
            let randomIdx = Math.floor(Math.random() * possibleMoves.length);
            game.move(possibleMoves[randomIdx]);
            board.position(game.fen());
            
            // Return control to player
            if (game.game_over()) {
                if (game.in_checkmate()) statusEl.html('Game Over! The Bot won. 🤖');
            } else {
                statusEl.html('Your turn (White)');
            }
        }

        function onDrop(source, target) {
            // See if the move is legal
            let move = game.move({
                from: source,
                to: target,
                promotion: 'q' // Always promote to queen for simplicity
            });

            // If illegal move, snap the piece back
            if (move === null) return 'snapback';

            statusEl.html('Bot is thinking...');
            // Make the bot move after a tiny 250ms delay
            window.setTimeout(makeRandomMove, 250);
        }

        function onSnapEnd() {
            board.position(game.fen());
        }

        function resetGame() {
            game.reset();
            board.start();
            statusEl.html('Your turn (White)');
        }

        // Initialize the chessboard configuration
        let config = {
            draggable: true,
            position: 'start',
            onDragStart: onDragStart,
            onDrop: onDrop,
            onSnapEnd: onSnapEnd,
            pieceTheme: 'https://chessboardjs.com{piece}.png'
        };
        board = Chessboard('myBoard', config);
    </script>
</body>
</html>
