    <!-- Load dependencies: jQuery, Chess.js (rules), and Chessboard.js (UI) -->
    <script src="https://jquery.com"></script>
    <script src="https://cloudflare.com"></script>
    <script src="https://cloudflare.com"></script>

    <script>
        let board = null;
        let game = new Chess();
        const statusEl = $('#status');
        let selectedSquare = null; // Track the first clicked piece

        function removeGreySquares() {
            $('#myBoard .square-55d63').css('background', '');
        }

        function greySquare(square) {
            let $square = $('#myBoard .square-' + square);
            let background = '#a9a9a9';
            if ($square.hasClass('black-3c85d')) {
                background = '#696969';
            }
            $square.css('background', background);
        }

        function makeRandomMove() {
            let possibleMoves = game.moves();

            if (possibleMoves.length === 0) {
                if (game.in_checkmate()) statusEl.html('Game Over! You win by checkmate! 🎉');
                else statusEl.html('Game Over! Draw/Stalemate! 🤝');
                return;
            }

            let randomIdx = Math.floor(Math.random() * possibleMoves.length);
            game.move(possibleMoves[randomIdx]);
            board.position(game.fen());
            removeGreySquares();
            
            if (game.game_over()) {
                if (game.in_checkmate()) statusEl.html('Game Over! The Bot won. 🤖');
            } else {
                statusEl.html('Your turn (White)');
            }
        }

        // Handle square clicking
        function handleSquareClick(square) {
            // Get list of legal moves for this state
            let moves = game.moves({ square: square, verbose: true });

            // If a piece was already selected, try to move there
            if (selectedSquare) {
                let move = game.move({
                    from: selectedSquare,
                    to: square,
                    promotion: 'q'
                });

                // If illegal move, reset selection or switch selected piece
                if (move === null) {
                    removeGreySquares();
                    let piece = game.get(square);
                    if (piece && piece.color === 'w') {
                        selectedSquare = square;
                        greySquare(square);
                        let targets = game.moves({ square: square, verbose: true });
                        targets.forEach(m => greySquare(m.to));
                    } else {
                        selectedSquare = null;
                    }
                    return;
                }

                // If valid move executed
                board.position(game.fen());
                selectedSquare = null;
                removeGreySquares();
                statusEl.html('Bot is thinking...');
                window.setTimeout(makeRandomMove, 250);
            } else {
                // First click: select a white piece
                let piece = game.get(square);
                if (piece && piece.color === 'w') {
                    selectedSquare = square;
                    greySquare(square);
                    moves.forEach(m => greySquare(m.to));
                }
            }
        }

        function onDragStart(source, piece, position, orientation) {
            if (game.game_over() || piece.search(/^b/) !== -1) return false;
        }

        function onDrop(source, target) {
            let move = game.move({
                from: source,
                to: target,
                promotion: 'q'
            });

            if (move === null) return 'snapback';

            selectedSquare = null;
            removeGreySquares();
            statusEl.html('Bot is thinking...');
            window.setTimeout(makeRandomMove, 250);
        }

        function onSnapEnd() {
            board.position(game.fen());
        }

        function resetGame() {
            game.reset();
            board.start();
            selectedSquare = null;
            removeGreySquares();
            statusEl.html('Your turn (White)');
        }

        let config = {
            draggable: true,
            position: 'start',
            onDragStart: onDragStart,
            onDrop: onDrop,
            onSnapEnd: onSnapEnd,
            pieceTheme: 'https://cloudflare.com{piece}.png'
        };
        board = Chessboard('myBoard', config);

        // Bind click events to the board squares
        $('#myBoard').on('click', '.square-55d63', function() {
            let square = $(this).attr('data-square');
            handleSquareClick(square);
        });
    </script>
</body>
</html>
