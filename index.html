<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Haaris670's Site - Home</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@chrisoakman/chessboard2@0.5.0/dist/chessboard2.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@chrisoakman/chessboard2@0.5.0/dist/chessboard2.min.js"></script>
    <style>
        /* --- CSS THEME VARIABLES --- */
        :root, .light {
            --bg-color: #f0f4f8;
            --text-color: #333333;
            --h1-color: #ff4757;
            --h2-color: #747d8c;
            --h3-color: #57606f;
            --nav-bg: #ffffff;
            --btn-bg: #1e90ff;
            --btn-hover: #1170cd;
            --btn-text: #ffffff;
            --box-bg: #ffffff;
            --box-border: #747d8c;
        }

        .dark {
            --bg-color: #1a1a1a;
            --text-color: #e0e0e0;
            --h1-color: #ff6b81;
            --h2-color: #a4b0be;
            --h3-color: #ced6e0;
            --nav-bg: #2d2d2d;
            --btn-bg: #2f3542;
            --btn-hover: #57606f;
            --btn-text: #ffffff;
            --box-bg: #2f3542;
            --box-border: #57606f;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            font-family: 'Arial Black', sans-serif;
            color: var(--text-color);
            text-align: center;
            transition: background-color 0.3s, color 0.3s;
        }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px;
            background-color: var(--nav-bg);
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            width: 100%;
            box-sizing: border-box;
        }

        .logo { font-size: 1.5rem; color: var(--h1-color); }
        .nav-links { display: flex; gap: 10px; }
        
        .nav-link-btn {
            background-color: var(--btn-bg);
            color: var(--btn-text);
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            text-decoration: none;
            font-size: 1rem;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        .nav-link-btn:hover { background-color: var(--btn-hover); }

        .main-container {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        h1 { font-size: 3rem; color: var(--h1-color); margin-top: 0; margin-bottom: 10px; }
        h2 { font-size: 1.8rem; color: var(--h2-color); margin-bottom: 30px; }
        h3 { font-size: 1.4rem; color: var(--h3-color); margin-bottom: 20px; }

        .screen {
            display: none; 
            flex-direction: column;
            align-items: center;
            width: 90%;
            max-width: 600px;
        }

        .active { display: flex; }

        .btn-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 100%;
            max-width: 300px;
            margin: 0 auto;
        }

        button {
            font-size: 1.5rem;
            padding: 15px 25px;
            background-color: var(--btn-bg);
            color: var(--btn-text);
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-family: inherit;
            transition: transform 0.1s, background-color 0.2s;
        }

        button:hover { background-color: var(--btn-hover); transform: scale(1.03); }
        .back-btn { background-color: #747d8c; margin-top: 20px; font-size: 1.2rem; padding: 10px 20px;}
        .back-btn:hover { background-color: #57606f; }

        /* Math Game Styling */
        .math-box { font-size: 3.5rem; margin-bottom: 20px; }
        input, textarea {
            font-size: 2rem;
            padding: 10px;
            text-align: center;
            border: 4px solid var(--box-border);
            background-color: var(--box-bg);
            color: var(--text-color);
            border-radius: 10px;
            font-family: inherit;
            outline: none;
        }
        #message { margin-top: 15px; font-size: 1.8rem; min-height: 40px; }

        /* --- CHESSBOARD GRAPHICS --- */
        .chessboard-wrapper {
            width: 440px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.3);
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 15px;
        }

        .cb-board-3db4d {
            background-image: url('board.png') !important;
            background-size: cover !important;
        }
        .cb-square-a83d6 {
            background-color: transparent !important;
        }

        .game-controls {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            margin-top: 10px;
            max-width: 440px;
        }

        .control-btn {
            font-size: 1.1rem;
            padding: 8px 16px;
            border-radius: 6px;
            background-color: #57606f;
        }
        .control-btn:hover {
            background-color: #3d4653;
        }
        .danger-btn { background-color: #ff4757; }
        .danger-btn:hover { background-color: #ff2a3b; }
        .warn-btn { background-color: #ffa502; }
        .warn-btn:hover { background-color: #ff9200; }

        #chess-status {
            font-size: 1.2rem;
            margin-top: 15px;
            font-weight: bold;
            color: var(--h1-color);
        }

        /* Editor Styling */
        textarea { width: 100%; height: 150px; font-family: monospace; font-size: 1.2rem; text-align: left; box-sizing: border-box; resize: vertical; }
        .output-box { background: #fff; color: #000; border: 3px dashed var(--box-border); width: 100%; padding: 15px; margin-top: 15px; border-radius: 10px; text-align: left; box-sizing: border-box; font-family: monospace; min-height: 50px; }
    </style>
    <script>
        const savedTheme = localStorage.getItem('selectedTheme');
        if (savedTheme) { document.documentElement.className = savedTheme; }
    </script>
</head>
<body>

    <nav>
        <div class="logo">Haaris670's Site</div>
        <div class="nav-links">
            <a href="settings/index.html" class="nav-link-btn">⚙️ Settings</a>
        </div>
    </nav>

    <div class="main-container">
        <div id="menu-screen" class="screen active">
            <h1>Welcome to my website!</h1>
            <h2>What activity do you want to do?</h2>
            <div class="btn-container">
                <button onclick="showScreen('math-screen'); startMath();">Math Questions</button>
                <button onclick="showScreen('chess-screen'); initVisualChess();">Chess</button>
                <button onclick="showScreen('lang-select-screen');">Code Editor</button>
            </div>
        </div>

        <div id="math-screen" class="screen">
            <h2>Math Game (<span id="math-score">0</span> / 10)</h2>
            <div class="math-box" id="math-question-text">Loading...</div>
            <input type="number" id="math-input" placeholder="?">
            <button onclick="checkMathAnswer()" style="margin-top:15px;">Submit</button>
            <div id="message"></div>
            <button class="back-btn" onclick="showScreen('menu-screen')">Quit Game</button>
        </div>

        <div id="chess-screen" class="screen">
            <h2>Interactive Chess Board (vs Bot)</h2>
            <div class="chessboard-wrapper">
                <div id="board-grid" style="width: 100%"></div>
            </div>
            
            <div class="game-controls">
                <button class="control-btn" onclick="navigateHistory(-1)" title="Move Back">⬅️</button>
                <button class="control-btn" onclick="navigateHistory(1)" title="Move Forward">➡️</button>
                <button class="control-btn warn-btn" onclick="handleTakeback()">↩️ Takeback</button>
                <button class="control-btn" onclick="handleDrawOffer()">🤝 Offer Draw</button>
                <button class="control-btn danger-btn" onclick="handleResign()">🏳️ Resign</button>
            </div>

            <div id="chess-status">Your turn (White)</div>
            <button class="back-btn" onclick="showScreen('menu-screen')">Leave Game</button>
        </div>

        <div id="lang-select-screen" class="screen">
            <h2>Code Editor</h2>
            <h3>Which programming language do you want to choose?</h3>
            <div class="btn-container">
                <button onclick="startEditor('Python')">Python</button>
                <button onclick="startEditor('Lua')">Lua</button>
                <button onclick="startEditor('HTML')">HTML</button>
            </div>
            <button class="back-btn" onclick="showScreen('menu-screen')">Back to Main Menu</button>
        </div>

        <div id="editor-screen" class="screen">
            <h2><span id="current-lang-title">HTML</span> Editor</h2>
            <p id="editor-hint" style="font-family:sans-serif; font-size:1rem; color:var(--h2-color); margin: 0 0 15px 0;"></p>
            <textarea id="editor-input"></textarea>
            <button onclick="runCode()" style="margin-top:15px; width:100%;">⚡ RUN CODE</button>
            <div class="output-box" id="editor-output">Your output will display here...</div>
            <button class="back-btn" onclick="showScreen('lang-select-screen')">Change Language</button>
        </div>
    </div>

    <script>
        function showScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
        }

        // --- MATH GAME ---
        const mathQuestions = [
            { q: "What is 12 × 12?", a: 144 }, { q: "What is the square root of 64?", a: 8 },
            { q: "What is 12 × 9?", a: 108 }, { q: "What is 7 × 9?", a: 63 },
            { q: "What is 12 × 5?", a: 60 }, { q: "What is 20 × 8?", a: 160 },
            { q: "What is 72 ÷ 8?", a: 9 }, { q: "What is 9 × 4?", a: 36 },
            { q: "What is 70 + 30?", a: 100 }, { q: "What is 39 ÷ 3?", a: 13 }
        ];
        let mathIndex = 0, mathScore = 0;

        function startMath() {
            mathIndex = 0; mathScore = 0;
            document.getElementById('math-score').textContent = mathScore;
            document.getElementById('message').textContent = "";
            document.getElementById('math-input').style.display = "block";
            document.getElementById('math-input').value = "";
            loadMathQuestion();
        }

        function loadMathQuestion() {
            if(mathIndex < mathQuestions.length) {
                document.getElementById('math-question-text').textContent = mathQuestions[mathIndex].q;
                document.getElementById('math-input').value = "";
                document.getElementById('math-input').focus();
            } else {
                document.getElementById('math-question-text').textContent = `🎉 Game Over! Final Score: ${mathScore}/10`;
                document.getElementById('math-input').style.display = "none";
            }
        }

        function checkMathAnswer() {
            let userAns = parseInt(document.getElementById('math-input').value);
            let msg = document.getElementById('message');
            if(userAns === mathQuestions[mathIndex].a || userAns === 1) {
                mathScore++;
                document.getElementById('math-score').textContent = mathScore;
                msg.textContent = "🎉 Correct! +1 point";
                msg.style.color = "#2ed573";
            } else {
                msg.textContent = `❌ Wrong! Correct answer: ${mathQuestions[mathIndex].a}`;
                msg.style.color = "#ff4757";
            }
            mathIndex++;
            setTimeout(() => { msg.textContent = ""; loadMathQuestion(); }, 1800);
        }

        // --- NATIVE ANIMATED CHESS ENGINE ---
        let board = null;
        let game = null;
        let moveHistory = [];
        let currentHistoryIndex = -1;
        let customGameOverState = false;

        function customPieceTheme(piece) {
            let pType = '';
            switch(piece.charAt(1).toLowerCase()) {
                case 'p': pType = 'pawn'; break;
                case 'r': pType = 'rook'; break;
                case 'n': pType = 'knight'; break;
                case 'b': pType = 'bishop'; break;
                case 'q': pType = 'queen'; break;
                case 'k': pType = 'king'; break;
            }
            return piece.charAt(0) + '_' + pType + '.png';
        }

        function initVisualChess() {
            game = new Chess();
            moveHistory = [];
            currentHistoryIndex = -1;
            customGameOverState = false;
            document.getElementById('chess-status').textContent = "Your turn (White)";

            const config = {
                draggable: true,
                position: 'start',
                pieceTheme: customPieceTheme,
                onDragStart: onDragStart,
                onDrop: onDrop
            };
            
            const container = document.getElementById('board-grid');
            container.innerHTML = ''; 
            board = Chessboard2(container, config);
        }

        function onDragStart(params) {
            if (game.game_over() || customGameOverState || currentHistoryIndex !== moveHistory.length - 1) return false;
            if (params.piece.search(/^b/) !== -1) return false;
        }

        function onDrop(params) {
            const move = game.move({
                from: params.source,
                to: params.target,
                promotion: 'q'
            });

            if (move === null) return 'snapback';

            moveHistory.push(move.san);
            currentHistoryIndex = moveHistory.length - 1;

            checkGameStatus();

            if (!game.game_over() && !customGameOverState) {
                document.getElementById('chess-status').textContent = "Bot is thinking...";
                window.setTimeout(makeBotMove, 500);
            }
        }

        function makeBotMove() {
            if (game.game_over() || customGameOverState) return;

            const possibleMoves = game.moves();
            if (possibleMoves.length === 0) return;

            const randomIdx = Math.floor(Math.random() * possibleMoves.length);
            const move = game.move(possibleMoves[randomIdx]);
            
            moveHistory.push(move.san);
            currentHistoryIndex = moveHistory.length - 1;

            board.position(game.fen(), true); 
            checkGameStatus();
        }

        function checkGameStatus() {
            if (customGameOverState) return;

            if (game.in_checkmate()) {
                document.getElementById('chess-status').textContent = game.turn() === 'w' ? "Checkmate! Bot wins." : "Checkmate! You win!";
            } else if (game.in_draw() || game.in_stalemate()) {
                document.getElementById('chess-status').textContent = "Game Over: Draw Match";
            } else if (game.in_check()) {
                document.getElementById('chess-status').textContent = game.turn() === 'w' ? "Your turn (White) - Check!" : "Bot's turn (Black) - Check!";
            } else {
                document.getElementById('chess-status').textContent = game.turn() === 'w' ? "Your turn (White)" : "Bot's turn (Black)";
            }
        }

        // --- GAME INTERACTION CONTROLS ---
        function handleTakeback() {
            if (customGameOverState) return;
            
            // Revert back to historical state before player and bot's last action frames
            if (moveHistory.length >= 2) {
                game.undo(); // Undo Bot Move
                game.undo(); // Undo Your Move
                moveHistory.pop();
                moveHistory.pop();
                currentHistoryIndex = moveHistory.length - 1;
                
                board.position(game.fen(), true);
                checkGameStatus();
            } else if (moveHistory.length === 1) {
                // If only one move has occurred
                game.undo();
                moveHistory.pop();
                currentHistoryIndex = moveHistory.length - 1;
                board.position(game.fen(), true);
                checkGameStatus();
            }
        }

        function handleResign() {
            if (game.game_over() || customGameOverState) return;
            customGameOverState = true;
            document.getElementById('chess-status').textContent = "🏳️ You resigned. Bot wins!";
        }

        function handleDrawOffer() {
            if (game.game_over() || customGameOverState) return;
            
            // Simulated 50% bot accept/decline algorithm
            const botAccepts = Math.random() > 0.5;
            if (botAccepts) {
                customGameOverState = true;
                document.getElementById('chess-status').textContent = "🤝 Bot accepted the draw offer. Game Over!";
            } else {
                document.getElementById('chess-status').textContent = "❌ Bot declined the draw offer. Keep playing!";
                setTimeout(checkGameStatus, 2000);
            }
        }

        // --- KEYBINDS & HISTORY NAVIGATION CONTROLLER ---
        function navigateHistory(direction) {
            if (moveHistory.length === 0) return;

            let targetIndex = currentHistoryIndex + direction;
            if (targetIndex >= -1 && targetIndex < moveHistory.length) {
                currentHistoryIndex = targetIndex;
                
                const historyGame = new Chess();
                for (let i = 0; i <= currentHistoryIndex; i++) {
                    historyGame.move(moveHistory[i]);
                }
                
                board.position(historyGame.fen(), true);
                
                if (currentHistoryIndex !== moveHistory.length - 1) {
                    document.getElementById('chess-status').textContent = `Reviewing Move ${currentHistoryIndex + 1}/${moveHistory.length}`;
                } else {
                    checkGameStatus();
                }
            }
        }

        window.addEventListener('keydown', function(e) {
            if (document.getElementById('chess-screen').classList.contains('active')) {
                if (e.key === 'ArrowLeft') {
                    navigateHistory(-1);
                } else if (e.key === 'ArrowRight') {
                    navigateHistory(1);
                }
            }
        });

        // --- CODE EDITOR ---
        let currentLanguage = 'HTML';
        function startEditor(lang) {
            currentLanguage = lang;
            document.getElementById('current-lang-title').textContent = lang;
            const txtArea = document.getElementById('editor-input');
            const hint = document.getElementById('editor-hint');
            document.getElementById('editor-output').innerHTML = "Your live output will display here...";

            if (lang === 'HTML') {
                hint.textContent = "Type HTML tags and hit RUN to view them rendered on screen.";
                txtArea.value = "<h1>Hello World!</h1>\n<p>This is my HTML design.</p>";
            } else {
                hint.textContent = `${lang} Simulation: Type print('your message') line-by-line.`;
                txtArea.value = `print('Hello from ${lang}!')`;
            }
            showScreen('editor-screen');
        }

        function runCode() {
            const input = document.getElementById('editor-input').value;
            const output = document.getElementById('editor-output');
            if (currentLanguage === 'HTML') {
                output.innerHTML = input; 
            } else {
                output.innerHTML = "";
                const lines = input.split('\n');
                lines.forEach(line => {
                    const match = line.match(/^print\s*\((.*)\)/);
                    if (match) {
                        const content = match[1].replace(/['"]/g, "");
                        output.innerHTML += `<div>&gt; ${content}</div>`;
                    }
                });
            }
        }

        window.onload = function() {
            document.getElementById('math-input').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') checkMathAnswer();
            });
        }
    </script>
</body>
</html>
