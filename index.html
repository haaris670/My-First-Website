<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Custom Chess Sandbox</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #1a1917;
            min-height: 100vh;
            margin: 0;
        }
        /* Uses your uploaded local board.jpg file */
        .board-wrapper {
            position: relative;
            width: 480px;
            height: 480px;
            max-width: 95vw;
            max-height: 95vw;
            background-image: url('board.jpg');
            background-size: 100% 100%;
            background-position: center;
            box-shadow: 0 12px 36px rgba(0,0,0,0.8);
        }
        .chess-grid {
            display: grid;
            grid-template-columns: repeat(8, 12.5%);
            grid-template-rows: repeat(8, 12.5%);
            width: 100%;
            height: 100%;
        }
        .square {
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            width: 100%;
            height: 100%;
            box-sizing: border-box;
            cursor: pointer;
        }
        /* Cyan box highlight when you select a piece */
        .selected {
            outline: 4px solid #00ffcc;
            background-color: rgba(0, 255, 204, 0.25);
            z-index: 5;
        }
        .piece {
            width: 85%;
            height: 85%;
            object-fit: contain;
            z-index: 10;
            user-select: none;
            -webkit-user-drag: none;
        }
    </style>
</head>
<body>

    <div class="board-wrapper">
        <div class="chess-grid" id="board">
            <!-- Row 8 (Black Major Pieces) -->
            <div class="square"><img src="https://chessboardjs.com" class="piece"></div>
            <div class="square"><img src="https://chessboardjs.com" class="piece"></div>
            <div class="square"><img src="https://chessboardjs.com" class="piece"></div>
            <div class="square"><img src="https://chessboardjs.com" class="piece"></div>
            <div class="square"><img src="https://chessboardjs.com" class="piece"></div>
            <div class="square"><img src="https://chessboardjs.com" class="piece"></div>
            <div class="square"><img src="https://chessboardjs.com" class="piece"></div>
            <div class="square"><img src="https://chessboardjs.com" class="piece"></div>

            <!-- Row 7 (Black Pawns) -->
            <div class="square"><img src="https://chessboardjs.com" class="piece"></div>
            <div class="square"><img src="https://chessboardjs.com" class="piece"></div>
            <div class="square"><img src="https://chessboardjs.com" class="piece"></div>
            <div class="square"><img src="https://chessboardjs.com" class="piece"></div>
            <div class="square"><img src="https://chessboardjs.com" class="piece"></div>
            <div class="square"><img src="https://chessboardjs.com" class="piece"></div>
            <div class="square"><img src="https://chessboardjs.com" class="piece"></div>
            <div class="square"><img src="https://chessboardjs.com" class="piece"></div>

            <!-- Rows 6 to 3 (Empty Grid Spaces) -->
            <div class="square"></div><div class="square"></div><div class="square"></div><div class="square"></div><div class="square"></div><div class="square"></div><div class="square"></div><div class="square"></div>
            <div class="square"></div><div class="square"></div><div class="square"></div><div class="square"></div><div class="square"></div><div class="square"></div><div class="square"></div><div class="square"></div>
            <div class="square"></div><div class="square"></div><div class="square"></div><div class="square"></div><div class="square"></div><div class="square"></div><div class="square"></div><div class="square"></div>
            <div class="square"></div><div class="square"></div><div class="square"></div><div class="square"></div><div class="square"></div><div class="square"></div><div class="square"></div><div class="square"></div>

            <!-- Row 2 (White Pawns) -->
            <div class="square"><img src="https://chessboardjs.com" class="piece"></div>
            <div class="square"><img src="https://chessboardjs.com" class="piece"></div>
            <div class="square"><img src="https://chessboardjs.com" class="piece"></div>
            <div class="square"><img src="https://chessboardjs.com" class="piece"></div>
            <div class="square"><img src="https://chessboardjs.com" class="piece"></div>
            <div class="square"><img src="https://chessboardjs.com" class="piece"></div>
            <div class="square"><img src="https://chessboardjs.com" class="piece"></div>
            <div class="square"><img src="https://chessboardjs.com" class="piece"></div>

            <!-- Row 1 (White Major Pieces) -->
            <div class="square"><img src="https://chessboardjs.com" class="piece"></div>
            <div class="square"><img src="https://chessboardjs.com" class="piece"></div>
            <div class="square"><img src="https://chessboardjs.com" class="piece"></div>
            <div class="square"><img src="https://chessboardjs.com" class="piece"></div>
            <div class="square"><img src="https://chessboardjs.com" class="piece"></div>
            <div class="square"><img src="https://chessboardjs.com" class="piece"></div>
            <div class="square"><img src="https://chessboardjs.com" class="piece"></div>
            <div class="square"><img src="https://chessboardjs.com" class="piece"></div>
        </div>
    </div>

    <script>
        let activeSquare = null;

        document.getElementById('board').addEventListener('click', function(e) {
            const clickedSquare = e.target.closest('.square');
            if (!clickedSquare) return;

            const existingPiece = clickedSquare.querySelector('.piece');

            if (!activeSquare) {
                // First click: Select a piece to move
                if (existingPiece) {
                    activeSquare = clickedSquare;
                    clickedSquare.classList.add('selected');
                }
            } else {
                // Second click: If clicking the same square, deselect it
                if (activeSquare === clickedSquare) {
                    activeSquare.classList.remove('selected');
                    activeSquare = null;
                    return;
                }

                const movingPiece = activeSquare.querySelector('.piece');

                // If moving onto an existing piece, capture it
                if (existingPiece) {
                    existingPiece.remove();
                }

                // Relocate the piece across the grid positions
                clickedSquare.appendChild(movingPiece);
                activeSquare.classList.remove('selected');
                activeSquare = null;
            }
        });
    </script>
</body>
</html>
