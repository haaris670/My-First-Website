    <!-- Load dependencies: jQuery, Chess.js (rules), and Chessboard.js (UI) -->
    <script src="https://jquery.com"></script>
    <script src="https://cloudflare.com"></script>
    <script src="https://cloudflare.com"></script>

    <script>
        let board = null;
        let game = new Chess();
        const statusEl = $('#status');
        let selectedSquare = null;

        function removeGreySquares() {
            $('#myBoard .square-55d63').css('background', '');
        }

        function greySquare(square) {
            let $square = $('#myBoard .square-' + square);
            let background = '#a9a9a9';
            if ($square.hasClass('black-3c85d')) {
                background = '#696969';
            }
            $square.css('background', background);
        }

        // --- NEW: FETCH STOCKFISH ENGINE MOVE VIA CLOUD API ---
        function makeStockfishMove() {
            let possibleMoves = game.moves();

            // Game over checks
            if (possibleMoves.length === 0) {
                if (game.in_checkmate()) statusEl.html('Game Over! You win by checkmate! 🎉');
                else statusEl.html('Game Over! Draw/Stalemate! 🤝');
                return;
            }

            // Get current board string (FEN format) to send to Stockfish
            let currentPosition = game.fen();

            // Use the free Stockfish Online API (Depth 10 calculation)
            $.getJSON('https://stockfish.online' + encodeURIComponent(currentPosition), function(data) {
                if (data && data.success && data.bestmove) {
                    // Extract the move text (e.g., "e2e4")
                    let bestMoveString = data.bestmove.split(' ')[1]; 
                    
                    // Convert format from "e2e4" to what chess.js understands
                    let move = game.move({
                        from: bestMoveString.substring(0, 2),
                        to: bestMoveString.substring(2, 4),
                        promotion: bestMoveString.length === 5 ? bestMoveString.charAt(4) : 'q'
                    });

                    board.position(game.fen());
                    removeGreySquares();

                    if (game.game_over()) {
                        if (game.in_checkmate()) statusEl.html('Game Over! Stockfish won. 🤖');
                    } else {
                        statusEl.html('Your turn (White)');
                    }
                } else {
                    // Fallback to random move if API fails temporarily
                    let randomIdx = Math.floor(Math.random() * possibleMoves.length);
                    game.move(possibleMoves[randomIdx]);
                    board.position(game.fen());
                    statusEl.html('Your turn (White) [API Fallback]');
                }
            });
        }

        function handleSquareClick(square) {
            let moves = game.moves({ square: square, verbose: true });

            if (selectedSquare) {
                let move = game.move({
                    from: selectedSquare,
                    to: square,
                    promotion: 'q'
                });

                if (move === null) {
                    removeGreySquares();
                    let piece = game.get(square);
                    if (piece && piece.color === 'w') {
                        selectedSquare = square;
                        greySquare(square);
                        let targets = game.moves({ square: square, verbose: true });
                        targets.forEach(m => greySquare(m.to));
                    } else {
                        selectedSquare = null;
                    }
                    return;
                }

                board.position(game.fen());
                selectedSquare = null;
                removeGreySquares();
                statusEl.html('Stockfish Bot is thinking... 🤔');
                window.setTimeout(makeStockfishMove, 250);
            } else {
                let piece = game.get(square);
                if (piece && piece.color === 'w') {
                    selectedSquare = square;
                    greySquare(square);
                    moves.forEach(m => greySquare(m.to));
                }
            }
        }

        function onDragStart(source, piece, position, orientation) {
            if (game.game_over() || piece.search(/^b/) !== -1) return false;
        }

        function onDrop(source, target) {
            let move = game.move({
                from: source,
                to: target,
                promotion: 'q'
            });

            if (move === null) return 'snapback';

            selectedSquare = null;
            removeGreySquares();
            statusEl.html('Stockfish Bot is thinking... 🤔');
            window.setTimeout(makeStockfishMove, 250);
        }

        function onSnapEnd() {
            board.position(game.fen());
        }

        // --- RESTART FUNCTION FIXED ---
        function resetGame() {
            game.reset();              // Resets chess.js rules engine
            board.start();             // Physically snaps all pieces to start position
            selectedSquare = null;     // Clears any active tile selections
            removeGreySquares();       // Wipes highlighting
            statusEl.html('Your turn (White) - New Game Started!');
        }

        let config = {
            draggable: true,
            position: 'start',
            onDragStart: onDragStart,
            onDrop: onDrop,
            onSnapEnd: onSnapEnd,
            pieceTheme: 'https://cloudflare.com{piece}.png'
        };
        board = Chessboard('myBoard', config);

        $('#myBoard').on('click', '.square-55d63', function() {
            let square = $(this).attr('data-square');
            handleSquareClick(square);
        });
    </script>
</body>
</html>
