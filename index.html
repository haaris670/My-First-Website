<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chess Sandbox Board</title>
    <!-- Load clean, standard chessboard styling -->
    <link rel="stylesheet" href="https://cloudflare.com">
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background-color: #262522;
            color: white;
            min-height: 100vh;
            margin: 0;
        }
        #myBoard {
            width: 450px;
            max-width: 95vw;
            box-shadow: 0 8px 24px rgba(0,0,0,0.6);
            border-radius: 4px;
            overflow: hidden;
        }
    </style>
</head>
<body>

    <!-- Render the physical 64-square board container -->
    <div id="myBoard"></div>

    <!-- Essential minimalist script setup -->
    <script src="https://jquery.com"></script>
    <script src="https://cloudflare.com"></script>

    <script>
        // Set configuration options to allow free movement across all 64 squares
        let config = {
            draggable: true,             // Enable drag-and-drop actions on pieces
            dropOffBoard: 'snapback',    // Snap a piece back if dropped outside boundaries
            position: 'start',           // Load standard piece layout positions
            pieceTheme: 'https://cloudflare.com{piece}.png'
        };

        // Render the board layout directly into the page block
        let board = Chessboard('myBoard', config);
    </script>
</body>
</html>
