<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Website - Mobile</title>
    
    <style>
        /* --- CSS THEME VARIABLES --- */
        :root, .light {
            --bg-color: #ffffff;
            --text-color: #333333;
            --nav-bg: #f8f9fa;
            --btn-bg: #e2e8f0;
            --btn-text: #000000;
        }

        .dark {
            --bg-color: #1a1a1a;
            --text-color: #ffffff;
            --nav-bg: #2d2d2d;
            --btn-bg: #4a5568;
            --btn-text: #ffffff;
        }

        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            transition: background-color 0.3s, color 0.3s;
        }

        header {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 15px;
            background-color: var(--nav-bg);
            border-bottom: 1px solid rgba(0,0,0,0.1);
            gap: 12px;
        }

        .logo {
            font-size: 20px;
            font-weight: bold;
        }

        .nav-links {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px;
        }

        /* --- MOBILE BUTTONS --- */
        .nav-btn {
            background-color: var(--btn-bg);
            color: var(--btn-text);
            border: none;
            padding: 8px 14px;
            font-size: 13px;
            font-weight: 600;
            border-radius: 20px;
            cursor: pointer;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            -webkit-tap-highlight-color: transparent;
        }

        .content {
            padding: 40px 20px;
            text-align: center;
        }

        h1 { font-size: 2rem; margin-bottom: 15px; }
        p { font-size: 1rem; line-height: 1.5; }
    </style>

    <script>
        const savedTheme = localStorage.getItem('selectedTheme');
        if (savedTheme) {
            document.documentElement.className = savedTheme;
        }
    </script>
</head>
<body>

    <header>
        <div class="logo">My Site 📱</div>
        <div class="nav-links">
            <a href="math.html" class="nav-btn">🧮 Math</a>
            <a href="chess.html" class="nav-btn">♟️ Chess</a>
            <a href="editor.html" class="nav-btn">💻 Editor</a>
            <a href="settings/index.html" class="nav-btn">⚙️ Settings</a>
        </div>
    </header>

    <div class="content">
        <h1>Mobile View</h1>
        <p>This layout keeps your project buttons compact and easy to tap on smaller screens.</p>
    </div>

</body>
</html>
