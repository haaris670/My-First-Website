<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Website - Mobile</title>
    
    <style>
        /* --- CSS THEME VARIABLES --- */
        :root, .light {
            --bg-color: #ffffff;
            --text-color: #333333;
            --nav-bg: #f8f9fa;
            --btn-bg: #e2e8f0;
            --btn-text: #000000;
        }

        .dark {
            --bg-color: #1a1a1a;
            --text-color: #ffffff;
            --nav-bg: #2d2d2d;
            --btn-bg: #4a5568;
            --btn-text: #ffffff;
        }

        /* --- GLOBAL MOBILE STYLES --- */
        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            transition: background-color 0.3s, color 0.3s;
        }

        /* --- MOBILE HEADER --- */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 20px;
            background-color: var(--nav-bg);
            border-bottom: 1px solid rgba(0,0,0,0.1);
        }

        .logo {
            font-size: 18px;
            font-weight: bold;
        }

        /* --- MOBILE SETTINGS BUTTON --- */
        .settings-btn {
            background-color: var(--btn-bg);
            color: var(--btn-text);
            border: none;
            padding: 8px 14px;
            font-size: 14px;
            font-weight: 600;
            border-radius: 20px; /* Rounded pill style for mobile */
            cursor: pointer;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            -webkit-tap-highlight-color: transparent; /* Smooth mobile tapping */
        }

        /* --- MOBILE CONTENT --- */
        .content {
            padding: 40px 20px;
            text-align: center;
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 15px;
        }

        p {
            font-size: 1rem;
            line-height: 1.5;
        }
    </style>

    <script>
        // Reads the chosen theme instantly when loading on mobile
        const savedTheme = localStorage.getItem('selectedTheme');
        if (savedTheme) {
            document.documentElement.className = savedTheme;
        }
    </script>
</head>
<body>

    <header>
        <div class="logo">My Site 📱</div>
        <div>
            <a href="settings/index.html" class="settings-btn">⚙️ Settings</a>
        </div>
    </header>

    <div class="content">
        <h1>Mobile View</h1>
        <p>This layout is optimized for your smartphone screen. Tap the Settings button above to change your site theme preferences!</p>
    </div>

</body>
</html>
